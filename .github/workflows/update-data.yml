name: 更新水道数据

on:
  # 每10分钟运行一次
  schedule:
    - cron: '*/10 * * * *'
  # 手动触发
  workflow_dispatch:
  # 代码推送时运行
  push:
    branches:
      - main
  # 每天 UTC 0 点（北京时间 8 点）强制更新
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: |
          pip install requests
        
      - name: 运行数据抓取脚本
        run: |
          python scripts/update_data.py
          
      - name: 复制数据到 public 目录
        run: |
          mkdir -p public/data
          cp data/full_data.json public/data/
          
      - name: 提交数据更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新水道数据 $(date '+%Y-%m-%d %H:%M')"
          file_pattern: |
            data/*.json
            public/data/*.json

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: 'main'
          
      - name: 设置 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
